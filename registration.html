<!DOCTYPE html>
<html lang="en">
<head>
    <title>Yoga Registration</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#d4edda;
        }
        nav{
            background:#2e8b57;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-size:18px;
            padding:8px 15px;
            border-radius:5px;
            transition:0.3s;
        }
        nav a:hover{
            background:white;
            color:#2e8b57;
        }
        .container{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#2e8b57;
        }

        label{
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:10px;
            margin:8px 0 20px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2e8b57;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#246b45;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }
        .login-link a{
            color:#2e8b57;
            text-decoration:none;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }
        footer{
            background:#2e8b57;
            color:white;
            text-align:center;
            padding:15px;
            position:fixed;
            bottom:0;
            width:100%;
        }
    </style>
</head>
<body>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="yogaposes.html">Yoga Poses</a>
<a href="benefits.html">Benefits</a>
<a href="registration.html">Join</a>
<a href="contact.html">Contact</a>
</nav>
<div class="container">
    <h2>Create Your Account</h2>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>

        <label>Gender</label>
        <select required>
            <option value="">Select Gender</option>
            <option>Female</option>
            <option>Male</option>
            <option>Other</option>
        </select>

        <label>Create Password</label>
        <input type="password" placeholder="Enter password" required>

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>

        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="signin.html">Sign In</a>
    </div>
</div>

<footer>
    © 2026 Yoga Wellness Center | Join and Start Your Healthy Journey
</footer>

</body>
</html>
